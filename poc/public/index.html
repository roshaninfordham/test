<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 48px;
      max-width: 560px;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { color: #a1a1aa; line-height: 1.6; margin-bottom: 24px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 32px; }
    .tag {
      background: #27272a;
      color: #fafafa;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    a {
      display: inline-block;
      background: #fafafa;
      color: #18181b;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
    .links { margin-top: 24px; display: flex; gap: 16px; justify-content: center; }
    .links a { background: transparent; border: 1px solid #27272a; color: #a1a1aa; font-weight: 400; }
    .links a:hover { color: #fafafa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Portfolio Web App</h1>
    <p>Next.js 15 personal portfolio with dark mode, project filtering, bento grid layout, and blog.</p>
    <div class="tags">
      <span class="tag">Next.js 15</span>
      <span class="tag">React 19</span>
      <span class="tag">TypeScript</span>
      <span class="tag">Tailwind v4</span>
      <span class="tag">shadcn/ui</span>
    </div>
    <a href="https://github.com/roshaninfordham/test" target="_blank">View on GitHub</a>
    <div class="links">
      <a href="#" onclick="alert('App deployed — check GitHub for the live URL')">Live App</a>
    </div>
  </div>
</body>
</html>
